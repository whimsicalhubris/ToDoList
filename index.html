<style>
  :root {
    --paper: #EDEAE2;
    --paper-dark: #E2DDD1;
    --ink: #211F1C;
    --ink-soft: #6B6459;
    --line: #C9C2B3;
    --critical: #B23A24;
    --critical-bg: #F4DDD5;
    --higher: #B8860B;
    --higher-bg: #F3E7C4;
    --low: #3E6B4F;
    --low-bg: #DCE8DD;
    --navy: #2B3A4A;
    --card: #FBF9F5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .mono {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
  }

  header {
    padding: 28px 20px 0 20px;
    background: var(--paper);
  }

  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }

  .count-badge {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }

  /* Folder tabs */
  .tabs {
    display: flex;
    gap: 6px;
  }

  .tab {
    position: relative;
    padding: 10px 22px 12px 22px;
    background: var(--paper-dark);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    top: 1px;
  }

  .tab.active {
    background: var(--card);
    color: var(--ink);
    top: 0;
  }

  .tab:hover:not(.active) {
    background: #d7d1c2;
  }

  main {
    flex: 1;
    background: var(--card);
    border-top: 1px solid var(--line);
    padding: 18px 20px 140px 20px;
    overflow-y: auto;
  }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    padding: 60px 20px;
    font-size: 14px;
  }

  .empty-state .glyph {
    font-size: 28px;
    display: block;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #fff;
    border: 1px solid var(--line);
    border-left: 5px solid var(--low);
    border-radius: 6px;
    padding: 12px 14px;
    animation: slideIn 0.25s ease;
  }

  .task.priority-critical { border-left-color: var(--critical); }
  .task.priority-higher { border-left-color: var(--higher); }
  .task.priority-low { border-left-color: var(--low); }

  .task.done { opacity: 0.72; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--line);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    margin-top: 2px;
    transition: all 0.15s ease;
    padding: 0;
  }

  .check-btn:hover {
    border-color: var(--navy);
  }

  .task.done .check-btn {
    background: var(--navy);
    border-color: var(--navy);
  }

  .task-body {
    flex: 1;
    min-width: 0;
  }

  .task-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .task-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
  }

  .task.done .task-title {
    text-decoration: line-through;
    color: var(--ink-soft);
  }

  .task-desc {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 3px;
    line-height: 1.4;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .pill.priority-critical { background: var(--critical-bg); color: var(--critical); }
  .pill.priority-higher { background: var(--higher-bg); color: var(--higher); }
  .pill.priority-low { background: var(--low-bg); color: var(--low); }

  .date-tag {
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  /* Add task form */
  .add-form {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--navy);
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom)) 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  }

  .add-form-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .add-row {
    display: flex;
    gap: 8px;
  }

  .add-form input[type="text"],
  .add-form textarea,
  .add-form select {
    background: #fff;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
  }

  .add-form input[type="text"]:focus,
  .add-form textarea:focus,
  .add-form select:focus {
    border-color: #6f8fae;
  }

  .add-form input[type="text"].title-input {
    flex: 1;
    font-weight: 600;
  }

  .add-form textarea {
    resize: none;
    height: 36px;
    flex: 1;
  }

  .add-form select {
    width: 110px;
    flex-shrink: 0;
    cursor: pointer;
    font-weight: 600;
  }

  .add-btn {
    flex-shrink: 0;
    background: #fff;
    color: var(--navy);
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .add-btn:hover { background: #eef3f7; }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #cfd9e2;
    margin-bottom: -4px;
  }

  .status-line {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 10px 0;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>Docket</h1>
    <span class="count-badge mono" id="countBadge">— tasks</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="active" id="tabActive">Active</div>
    <div class="tab" data-tab="closed" id="tabClosed">Closed</div>
  </div>
</header>

<main id="main">
  <div class="task-list" id="taskList"></div>
</main>

<form class="add-form" id="addForm">
  <div class="add-form-inner">
    <div class="add-row">
      <input type="text" class="title-input" id="inputTitle" placeholder="Task title" maxlength="120" required />
      <select id="inputPriority">
        <option value="critical">🔴 Critical</option>
        <option value="higher" selected>🟡 Higher</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div class="add-row">
      <textarea id="inputDesc" placeholder="Brief description (optional)" maxlength="240"></textarea>
      <button type="submit" class="add-btn" id="addBtn">Add</button>
    </div>
  </div>
</form>

<script>
(function () {
  const STORAGE_KEY = 'docket:tasks';
  let tasks = [];
  let currentTab = 'active';
  let loaded = false;

  const taskListEl = document.getElementById('taskList');
  const countBadge = document.getElementById('countBadge');
  const tabActive = document.getElementById('tabActive');
  const tabClosed = document.getElementById('tabClosed');
  const addForm = document.getElementById('addForm');
  const inputTitle = document.getElementById('inputTitle');
  const inputDesc = document.getElementById('inputDesc');
  const inputPriority = document.getElementById('inputPriority');
  const addBtn = document.getElementById('addBtn');

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function priorityLabel(p) {
    return p === 'critical' ? 'Critical' : p === 'higher' ? 'Higher need' : 'Low priority';
  }

  function saveTasks() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      console.error('Failed to save tasks', e);
    }
  }

  function loadTasks() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        tasks = JSON.parse(stored);
      }
    } catch (e) {
      // no tasks saved yet, or storage unavailable — that's fine
      tasks = [];
    }
    loaded = true;
    render();
  }

  function render() {
    if (!loaded) {
      taskListEl.innerHTML = '<div class="empty-state">Loading…</div>';
      return;
    }

    const filtered = tasks
      .filter(t => (currentTab === 'active' ? !t.done : t.done))
      .sort((a, b) => {
        if (currentTab === 'active') {
          const order = { critical: 0, higher: 1, low: 2 };
          if (order[a.priority] !== order[b.priority]) return order[a.priority] - order[b.priority];
          return new Date(b.createdAt) - new Date(a.createdAt);
        }
        return new Date(b.completedAt) - new Date(a.completedAt);
      });

    const activeCount = tasks.filter(t => !t.done).length;
    const closedCount = tasks.filter(t => t.done).length;
    countBadge.textContent = (currentTab === 'active' ? activeCount : closedCount) +
      (currentTab === 'active' ? ' open' : ' closed');

    if (filtered.length === 0) {
      taskListEl.innerHTML = `
        <div class="empty-state">
          <span class="glyph">${currentTab === 'active' ? '✓' : '□'}</span>
          ${currentTab === 'active' ? 'Nothing on your list. Add a task below.' : 'No completed tasks yet.'}
        </div>`;
      return;
    }

    taskListEl.innerHTML = filtered.map(t => `
      <div class="task priority-${t.priority} ${t.done ? 'done' : ''}" data-id="${t.id}">
        <button class="check-btn" data-action="toggle" data-id="${t.id}" aria-label="${t.done ? 'Reopen task' : 'Complete task'}">
          ${t.done ? '✓' : ''}
        </button>
        <div class="task-body">
          <div class="task-top">
            <div class="task-title">${escapeHtml(t.title)}</div>
          </div>
          ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ''}
          <div class="task-meta">
            <span class="pill priority-${t.priority}">${priorityLabel(t.priority)}</span>
            <span class="date-tag mono">Added ${fmtDate(t.createdAt)}</span>
            ${t.done ? `<span class="date-tag mono">· Completed ${fmtDate(t.completedAt)}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  taskListEl.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action="toggle"]');
    if (!btn) return;
    const id = btn.getAttribute('data-id');
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    task.completedAt = task.done ? new Date().toISOString() : null;
    render();
    await saveTasks();
  });

  tabActive.addEventListener('click', () => {
    currentTab = 'active';
    tabActive.classList.add('active');
    tabClosed.classList.remove('active');
    render();
  });

  tabClosed.addEventListener('click', () => {
    currentTab = 'closed';
    tabClosed.classList.add('active');
    tabActive.classList.remove('active');
    render();
  });

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = inputTitle.value.trim();
    if (!title) return;

    addBtn.disabled = true;
    const newTask = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      title,
      description: inputDesc.value.trim(),
      priority: inputPriority.value,
      createdAt: new Date().toISOString(),
      done: false,
      completedAt: null
    };
    tasks.push(newTask);
    inputTitle.value = '';
    inputDesc.value = '';
    inputPriority.value = 'higher';
    currentTab = 'active';
    tabActive.classList.add('active');
    tabClosed.classList.remove('active');
    render();
    await saveTasks();
    addBtn.disabled = false;
    inputTitle.focus();
  });

  loadTasks();

  // Register an inline service worker (via Blob URL) so Chrome recognizes
  // this page as an installable PWA and it can launch/reload while offline.
  if ('serviceWorker' in navigator) {
    const swSource = `
      const CACHE_NAME = 'docket-cache-v1';
      self.addEventListener('install', (event) => {
        self.skipWaiting();
      });
      self.addEventListener('activate', (event) => {
        event.waitUntil(self.clients.claim());
      });
      self.addEventListener('fetch', (event) => {
        event.respondWith(
          caches.open(CACHE_NAME).then(async (cache) => {
            try {
              const response = await fetch(event.request);
              cache.put(event.request, response.clone());
              return response;
            } catch (err) {
              const cached = await cache.match(event.request);
              return cached || new Response('Offline', { status: 503 });
            }
          })
        );
      });
    `;
    const blob = new Blob([swSource], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch((err) => {
      console.log('Service worker registration skipped:', err);
    });
  }
})();
</script>

</body>
</html>
